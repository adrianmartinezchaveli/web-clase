<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>{% block title %}SySM Quiz{% endblock %}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header>
  <div class="container header-inner">
    <a href="{{ url_for('index') }}" class="brand">
      <span class="logo">Σ</span>
      <span class="brand-text">
        SySM · Quiz
        <small>Síntesis y Simulación de Mecanismos</small>
      </span>
    </a>
    <nav class="nav">
      <a href="{{ url_for('leaderboard') }}" class="nav-link">🏆 Ranking</a>
      {% if current_user.is_authenticated %}
        <span class="nav-user">{{ current_user.username }}</span>
        <a href="{{ url_for('logout') }}" class="nav-link">Salir</a>
      {% else %}
        <a href="{{ url_for('login') }}" class="nav-link">Iniciar sesión</a>
        <a href="{{ url_for('register') }}" class="btn nav-btn">Registrarse</a>
      {% endif %}
    </nav>
  </div>
</header>
<main class="container">
{% block content %}{% endblock %}
</main>
<footer>
  <div class="container">
    <small>Práctica local · Preguntas estilo examen diciembre · 14 preguntas por test</small>
  </div>
</footer>
</body>
</html>
