{% extends "base.html" %}
{% block content %}
<section class="test-header">
  <a href="{{ url_for('index') }}" class="back">← Volver al menú</a>
  <h1>{{ topic.name }}</h1>
  <div class="meta">
    <span class="meta-pill"><span id="progress">Respondidas <strong>0 / 14</strong></span></span>
    <span class="meta-pill" id="score-live-wrap" style="display:none">
      <span id="score-live"></span>
    </span>
    {% if not current_user.is_authenticated %}
    <span class="meta-pill">
      <a href="{{ url_for('login') }}" style="color: var(--accent-2); text-decoration: none;">Inicia sesión</a>
      para guardar tu puntuación
    </span>
    {% endif %}
  </div>
</section>

<section id="quiz" class="quiz"></section>

<section id="result" class="result hidden">
  <h2>Resultado final</h2>
  <p id="result-summary"></p>
  <div class="actions">
    <button id="retry" class="btn primary">Repetir con nuevas preguntas</button>
    <a href="{{ url_for('index') }}" class="btn">Cambiar de tema</a>
  </div>
  <div id="review" class="review"></div>
</section>

<script>
const TOPIC_ID = "{{ topic.id }}";
const USER_LOGGED_IN = {{ 'true' if current_user.is_authenticated else 'false' }};
</script>
<script src="{{ url_for('static', filename='quiz.js') }}"></script>
{% endblock %}
