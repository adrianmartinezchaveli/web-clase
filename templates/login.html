{% extends "base.html" %}
{% block title %}Iniciar sesión · SySM Quiz{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Iniciar sesión</h1>
    {% if error %}
    <div class="alert alert-err">{{ error }}</div>
    {% endif %}
    <form method="post" autocomplete="on">
      <label class="field-label" for="username">Usuario</label>
      <input class="field-input" id="username" name="username" type="text"
             autocomplete="username" required autofocus>
      <label class="field-label" for="password">Contraseña</label>
      <input class="field-input" id="password" name="password" type="password"
             autocomplete="current-password" required>
      <button class="btn primary full-width" type="submit">Entrar</button>
    </form>
    <p class="auth-footer">¿No tienes cuenta?
      <a href="{{ url_for('register') }}">Regístrate</a>
    </p>
  </div>
</div>
{% endblock %}
