{% extends "base.html" %}
{% block content %}
<section class="hero">
  <h1>Elige un tema para practicar</h1>
  <p>Cada test contiene 14 preguntas seleccionadas al azar de un banco específico. Estilo del examen de diciembre.</p>
</section>
<section class="grid">
  {% for t in topics %}
  <a class="card" href="{{ url_for('test_view', topic_id=t.id) }}">
    <div class="card-head">
      <h2>{{ t.name }}</h2>
      <span class="count">{{ counts[t.id] }} preguntas</span>
    </div>
    <div class="card-cta">Comenzar test →</div>
  </a>
  {% endfor %}
</section>
{% endblock %}
